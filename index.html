    <title>Pronouns</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color-scheme: light dark;
        --bg: #fff;
        --fg: #000;
        --muted: #64748b;
        --dim: #94a3b8;
        --accent: #0ea5e9;
        --border: #ccc;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #000;
          --fg: #f8fafc;
          --muted: #94a3b8;
          --dim: #64748b;
          --border: #334155;
        }
      }
      body {
        margin: 0;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100svh;
        text-align: center;
        background: var(--bg);
        color: var(--fg);
        box-sizing: border-box;
      }
      main {
        max-width: 720px;
        width: 100%;
      }
      h1 {
        font-size: 4rem;
        margin: 0;
        outline: none;
        cursor: text;
        display: inline-block;
        min-width: 1rem;
      }
      h1:empty:before {
        content: attr(data-placeholder);
        color: var(--dim);
      }
      .pronouns {
        font-size: 1.5rem;
        color: var(--muted);
        margin-top: 0.5rem;
        min-height: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .muted {
        color: var(--dim);
        font-size: 0.9rem;
        margin-top: 2rem;
        min-height: 1.2rem;
      }
      a {
        color: inherit;
        text-decoration: underline;
      }
      .spinner {
        display: inline-block;
        width: 1.5rem;
        height: 1.5rem;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

        <div id="pronouns" class="pronouns"></div>
        <div id="details" class="muted"></div>
      </div>

      <footer>
        <p class="muted">Data from <a href="https://www.wikidata.org" target="_blank" rel="noopener">Wikidata</a></p>
      </footer>
    </main>

      function setStatus(busy = false) {
        if (busy) {
          pronounsEl.innerHTML = '<span class="spinner" aria-hidden="true"></span>'
        }
      }

      function getNameFromFragment() {
        const frag = decodeURIComponent(location.hash.slice(1) || '').trim()
        return frag || null
      }

      function escapeHtml(s) {
        return String(s).replace(
          /[&"'<>]/g,
          c => ({ '&': '&amp;', '"': '&quot;', "'": '&#39;', '<': '&lt;', '>': '&gt;' })[c],
        )
      }

      let debounceTimer
      let abortController
      nameEl.addEventListener('input', () => {
        clearTimeout(debounceTimer)
        if (abortController) abortController.abort()

        debounceTimer = setTimeout(() => {
          const val = nameEl.textContent.trim()
          if (val) {
            location.hash = encodeURIComponent(val)
          } else {
            history.replaceState(null, null, ' ')
            trigger()
          }
        }, 200)
      })

      async function trigger() {
        const name = getNameFromFragment()
        if (!name) {
          nameEl.textContent = ''
          pronounsEl.textContent = ''
          detailsEl.textContent = ''
          return
        }
        if (nameEl.textContent !== name) nameEl.textContent = name

        if (abortController) abortController.abort()
        abortController = new AbortController()
        await lookup(name, abortController.signal)
      }

      async function lookup(name, signal) {
        pronounsEl.textContent = ''
        detailsEl.textContent = ''

        const trimmedName = name.split(' ')[0]
        const maleId = PRECACHED.male[trimmedName]
        const femaleId = PRECACHED.female[trimmedName]

        if (maleId || femaleId) {
          const isAmbiguous = maleId && femaleId
          const id = maleId || femaleId
          const gender = maleId ? 'male' : 'female'

          pronounsEl.textContent = isAmbiguous ? 'ambiguous' : gender === 'male' ? 'he/him' : 'she/her'
          detailsEl.innerHTML =
            '<a href="https://www.wikidata.org/wiki/' +
            id +
            '" target="_blank" rel="noopener">' +
            escapeHtml(trimmedName) +
            '</a> — ' +
            (isAmbiguous ? 'ambiguous name' : gender + ' given name')
          return
        }

        setStatus(true)

        try {
          const isFullName = name.trim().includes(' ')
          const sUrl =
            'https://www.wikidata.org/w/api.php?action=wbsearchentities&format=json&language=en&type=item&search=' +
            encodeURIComponent(name) +
            '&limit=10&origin=*'
          const sResp = await fetch(sUrl, { signal })
          const sJson = await sResp.json()
          if (!sJson.search || sJson.search.length === 0) {
            pronounsEl.textContent = '?'
            return
          }

          const results = isFullName
            ? sJson.search
            : sJson.search.filter(
                r =>
                  r.description?.toLowerCase().includes('given name') ||
                  r.label?.toLowerCase().includes('(given name)'),
              )

          const entitiesToGet = (results.length > 0 ? results : sJson.search).slice(0, 5)
          const ids = entitiesToGet.map(r => r.id).join('|')
          const gUrl =
            'https://www.wikidata.org/w/api.php?action=wbgetentities&format=json&ids=' +
            ids +
            '&props=claims|labels|descriptions&origin=*'
          const gResp = await fetch(gUrl, { signal })
          const gJson = await gResp.json()

          let foundMale = false
          let foundFemale = false
          let entities = []

          for (const id of Object.keys(gJson.entities || {})) {
            const ent = gJson.entities[id]
            const label = (ent.labels && ent.labels.en && ent.labels.en.value) || ent.id
            const desc = ent.descriptions && ent.descriptions.en && ent.descriptions.en.value

            entities.push({ id, label, desc })

            const claims = ent.claims && ent.claims.P21
            if (claims && claims.length) {
              for (const claim of claims) {
                const value = claim.mainsnak?.datavalue?.value?.id
                if (value === 'Q6581097') foundMale = true
                if (value === 'Q6581072') foundFemale = true
              }
            }

            // Check if the description itself indicates gender
            if (desc) {
              const lowerDesc = desc.toLowerCase()
              if (lowerDesc.includes('male given name')) foundMale = true
              if (lowerDesc.includes('female given name')) foundFemale = true
            }
          }

          if (foundFemale && !foundMale) pronounsEl.textContent = 'she/her'
          else if (foundMale && !foundFemale) pronounsEl.textContent = 'he/him'
          else if (foundMale && foundFemale) pronounsEl.textContent = 'ambiguous'
          else {
            pronounsEl.textContent = 'unknown'
            detailsEl.textContent = ''
            return
          }

          const firstEnt = entities[0]
          if (firstEnt) {
            detailsEl.innerHTML =
              '<a href="https://www.wikidata.org/wiki/' +
              firstEnt.id +
              '" target="_blank" rel="noopener">' +
              escapeHtml(firstEnt.label) +
              '</a>' +
              (firstEnt.desc ? ' — ' + escapeHtml(firstEnt.desc) : '')
          }
        } catch (err) {
          if (err.name !== 'AbortError') {
            console.error(err)
          }
        }
      }

      window.addEventListener('hashchange', trigger)
      trigger()
